name: Build Qwen Pod image

on:
  push:
    branches: [main]
    paths:
      - "pod/**"
      - ".github/workflows/build-private-pod.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space for the ComfyUI base image
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          df -h /
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: pod/Dockerfile
          push: true
          tags: ghcr.io/m0bac/qwen-image-edit-pod:latest
